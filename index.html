<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Plymouth Diving — skills progression</title>
<style>
:root{--ink:#0b0b0b;--muted:#52514e;--faint:#898781;--grid:#e1e0d9;--zero:#c3c2b7;--bg:#fcfcfb;--card:#fff;--border:rgba(11,11,11,.10);--accent:#2a78d6;--sel:#e6f1fb;--mono:ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
@media(prefers-color-scheme:dark){:root{--ink:#fff;--muted:#c3c2b7;--faint:#898781;--grid:#2c2c2a;--zero:#383835;--bg:#1a1a19;--card:#222;--border:rgba(255,255,255,.12);--sel:#0c447c;}}
*{box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);margin:0;line-height:1.55}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
aside{border-right:.5px solid var(--border);padding:16px 8px;overflow-y:auto}
aside h1{font-size:15px;font-weight:500;margin:4px 8px 12px}
.diver{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.diver:hover{background:var(--sel)}
.diver.sel{background:var(--sel);font-weight:500}
.diver .n{font-size:11px;color:var(--faint)}
main{padding:24px 28px;max-width:840px}
h2{font-size:20px;font-weight:500;margin:0 0 2px}
.sub{font-size:13px;color:var(--muted);margin:0 0 16px}
h3{font-size:14px;font-weight:500;margin:22px 0 4px}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:4px 12px 8px 0;cursor:pointer;user-select:none}
.toggle input{width:16px;height:16px;cursor:pointer}
.seg{display:inline-flex;border:.5px solid var(--border);border-radius:8px;overflow:hidden;margin:4px 0 8px}
.seg button{border:0;background:transparent;color:var(--muted);font-size:13px;padding:5px 12px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--sel);color:var(--ink)}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:6px 0;font-size:11px;color:var(--muted)}
.legend .code{color:var(--ink);font-family:var(--mono)}
.panel{position:relative;width:100%;height:200px}
.empty{color:var(--faint);font-size:14px;padding:40px 0}
.bandwrap{margin-top:6px}
select.diveSel{font-size:13px;padding:5px 8px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);font-family:inherit;margin:4px 0 8px}
.note{font-size:12px;color:var(--faint);margin-top:20px;border-top:.5px solid var(--border);padding-top:10px}
.row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
</style></head><body>

            return ["judges: "+e.j.join(" / "),"raw total: "+e.raw.toFixed(1),"DD "+e.dd.toFixed(1)+" → "+e.pts.toFixed(2)+" pts","vs avg: "+s+e.corr.toFixed(2)];}}}},
      scales:{y:{min:ymin,max:ymax,title:{display:true,text:yt,color:col("--faint"),font:{size:10}},ticks:{color:col("--faint"),font:{size:10}},
        grid:{color:c=>(mode=="corr"&&c.tick.value===0)?col("--zero"):col("--grid"),lineWidth:c=>(mode=="corr"&&c.tick.value===0)?1.5:1}},
        x:{ticks:{color:col("--faint"),font:{size:10}},grid:{display:false}}}}}));
}


function strengthsChart(el,summary){
  const labels=summary.map(s=>s.code+(s.n<4?" (n="+s.n+")":""));
  const vals=summary.map(s=>s.mean);
  const colors=summary.map(s=>Mcol[s.M]);
  const h=Math.max(160,summary.length*28+40);
  el.parentElement.style.height=h+"px";
  charts.push(new Chart(el,{type:"bar",data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:4,barThickness:18}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{title:i=>summary[i[0].dataIndex].code,
          label:it=>{const s=summary[it.dataIndex];return ["avg vs field: "+(s.mean>=0?"+":"")+s.mean.toFixed(2),"across "+s.n+" meet"+(s.n>1?"s":""),Mlab[s.M]];}}}},
      scales:{x:{title:{display:true,text:"avg vs field average (all meets)",color:col("--faint"),font:{size:10}},ticks:{color:col("--faint"),font:{size:10}},grid:{color:c=>c.tick.value===0?col("--zero"):col("--grid"),lineWidth:c=>c.tick.value===0?1.5:1}},
        y:{ticks:{color:col("--ink"),font:{size:11,family:"ui-monospace,Menlo,monospace"}},grid:{display:false}}}}}));
}


function bandChart(el,name,M,code){
  const d=DATA.divers[name];
  const series=d.dives[M][code];
  const bands=[],pts=[],labels=[];
  DATA.meetorder.forEach((m,i)=>{
    const e=series[i];
    if(!e){bands.push(null);pts.push(null);return;}
    const key=m+"|"+e.ev+"|"+code;
    const fs=DATA.fieldstats[key];
    bands.push(fs?[fs.q1,fs.q3]:null);
    pts.push(e.raw);
  });
  bandChartInstance=new Chart(el,{type:"bar",data:{labels:xlabels(),
    datasets:[
      {type:"bar",label:"field IQR",data:bands,backgroundColor:"rgba(42,120,214,0.18)",borderColor:"rgba(42,120,214,0.35)",borderWidth:1,borderRadius:3,barThickness:34,order:2},
      {type:"line",label:name,data:pts,borderColor:"#eb6834",backgroundColor:"#eb6834",borderWidth:0,pointRadius:6,pointHoverRadius:8,pointStyle:"circle",showLine:false,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          title:i=>{const l=i[0].label;return Array.isArray(l)?l.join(" "):l;},
          label:it=>{
            const idx=it.dataIndex; const e=series[idx];
            if(it.datasetIndex===0){const b=bands[idx];if(!b)return"no field data";const key=DATA.meetorder[idx]+"|"+(e?e.ev:"")+"|"+code;const fs=DATA.fieldstats[key];return ["field: min "+fs.min.toFixed(1)+" · q1 "+fs.q1.toFixed(1)+" · median "+fs.med.toFixed(1)+" · q3 "+fs.q3.toFixed(1)+" · max "+fs.max.toFixed(1),"n = "+fs.n+" divers on this dive"];}
            if(!e)return ""; return [name+": "+e.raw.toFixed(1),"judges: "+e.j.join(" / "),"DD "+e.dd.toFixed(1)+" → "+e.pts.toFixed(2)+" pts"];
          }}}},
      scales:{y:{title:{display:true,text:"raw 3-judge total",color:col("--faint"),font:{size:10}},ticks:{color:col("--faint"),font:{size:10}},grid:{color:col("--grid")}},
        x:{ticks:{color:col("--faint"),font:{size:10}},grid:{display:false},stacked:false}}}});
}

function render(name){
  destroyCharts();
  const d=DATA.divers[name];
  const nMeets=d.pos.filter(p=>p.better!=null).length;
  let h="<h2>"+name+"</h2><p class=sub>"+d.club+" · "+nMeets+" meet"+(nMeets>1?"s":"")+" with full field data</p>";
  if(nMeets<2){h+="<div class=empty>Only one meet on record — no progression to show. Per-dive detail below.</div>";}
  h+="<h3>Strengths &amp; weaknesses (all dives, ranked)</h3>";
  h+="<div class=legend><span style='display:flex;align-items:center;gap:5px'><span style='width:10px;height:10px;border-radius:2px;background:#2a78d6'></span>poolside</span><span style='display:flex;align-items:center;gap:5px'><span style='width:10px;height:10px;border-radius:2px;background:#eb6834'></span>1m</span><span style='display:flex;align-items:center;gap:5px'><span style='width:10px;height:10px;border-radius:2px;background:#1baf7a'></span>3m</span></div>";
  h+="<div class=panel style='height:auto'><canvas id=strc></canvas></div>";
  h+="<h3>Score vs field spread</h3><p class=sub style='margin:-2px 0 6px'>Pick a dive to see the diver's score against the field's middle 50% (shaded) for that dive, at each meet.</p>";
  h+="<select class=diveSel id=bandSel></select>";
  h+="<div class=panel bandwrap><canvas id=bandc></canvas></div>";
  h+="<h3>Field standing over time</h3>";
  h+="<div class=seg><button id=pp data-m=pct class=\""+(posmode=="pct"?"on":"")+"\">percentage</button><button id=pr data-m=pos class=\""+(posmode=="pos"?"on":"")+"\">actual position</button></div>";
  h+="<div class=panel><canvas id=posc></canvas></div>";
  h+="<label class=toggle><input type=checkbox id=modebox "+(mode=="raw"?"checked":"")+"> show raw judge totals instead of severity-corrected</label>";
  const stationKeys=Object.keys(d.dives).sort();
  for(const M of stationKeys){h+="<h3>"+Mlab[M]+"</h3><div class=legend id=lg"+M+"></div><div class=panel><canvas id=dc"+M+"></canvas></div>";}
  h+='<p class=note>Field standing reconstructed from summed DD-points; matches official placings. Percentage view normalises for field size (good across meets) but flatters tiny fields — e.g. 1st of 2 shows as top 50%. Actual-position view shows the real placing (1st at top) but does not account for how many competed. Per-dive severity-corrected = points above/below that meet\'s field average for that dive. Four meets, Nov 2025 – Jul 2026.</p>';
  document.getElementById("main").innerHTML=h;
  posChart(document.getElementById("posc"),d.pos);
  strengthsChart(document.getElementById("strc"),d.strengths);
  const bandOpts=[];
  for(const M of Object.keys(d.dives).sort()){for(const c of Object.keys(d.dives[M])){bandOpts.push({M,c});}}
  const bandSel=document.getElementById("bandSel");
  bandSel.innerHTML=bandOpts.map(o=>"<option value='"+o.M+"|"+o.c+"'>"+Mlab[o.M]+" · "+o.c+"</option>").join("");
  function drawBand(){
    if(bandChartInstance){bandChartInstance.destroy();bandChartInstance=null;}
    const [M,c]=bandSel.value.split("|");
    bandChart(document.getElementById("bandc"),name,M,c);
  }
  bandSel.onchange=drawBand;
  drawBand();

  for(const M of stationKeys){
    const codes=Object.keys(d.dives[M]);
    diveChart(document.getElementById("dc"+M),codes,d.dives[M]);
    document.getElementById("lg"+M).innerHTML=codes.map((c,i)=>"<span style='display:flex;align-items:center;gap:5px'><span style='width:22px;height:0;border-top:2.5px "+dstyle[i%5]+" "+cove[i%5]+"'></span><span class=code>"+c+"</span></span>").join("");
  }
  document.getElementById("modebox").onchange=e=>{mode=e.target.checked?"raw":"corr";render(name);};
  document.getElementById("pp").onclick=()=>{posmode="pct";render(name);};
  document.getElementById("pr").onclick=()=>{posmode="pos";render(name);};
}

const names=Object.keys(DATA.divers).sort();
document.getElementById("list").innerHTML=names.map(n=>{
  const nm=DATA.divers[n].pos.filter(p=>p.better!=null).length;
  return "<div class=diver data-n='"+n.replace(/'/g,"&#39;")+"'><span>"+n+"</span><span class=n>"+nm+"</span></div>";
}).join("");
document.querySelectorAll(".diver").forEach(el=>el.onclick=()=>{
  document.querySelectorAll(".diver").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel"); render(el.dataset.n);
});
</script></body></html>
