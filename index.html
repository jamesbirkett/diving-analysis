<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Plymouth Diving — skills progression</title>
<style>
:root{--ink:#0b0b0b;--muted:#52514e;--faint:#898781;--grid:#e1e0d9;--zero:#c3c2b7;--bg:#fcfcfb;--card:#fff;--border:rgba(11,11,11,.10);--accent:#2a78d6;--sel:#e6f1fb;--mono:ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
@media(prefers-color-scheme:dark){:root{--ink:#fff;--muted:#c3c2b7;--faint:#898781;--grid:#2c2c2a;--zero:#383835;--bg:#1a1a19;--card:#222;--border:rgba(255,255,255,.12);--sel:#0c447c;}}
*{box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);margin:0;line-height:1.55}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
aside{border-right:.5px solid var(--border);padding:16px 8px;overflow-y:auto}
aside h1{font-size:15px;font-weight:500;margin:4px 8px 12px}
.diver{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.diver:hover{background:var(--sel)}
.diver.sel{background:var(--sel);font-weight:500}
.diver .n{font-size:11px;color:var(--faint)}
main{padding:24px 28px;max-width:840px}
h2{font-size:20px;font-weight:500;margin:0 0 2px}
.sub{font-size:13px;color:var(--muted);margin:0 0 16px}
h3{font-size:14px;font-weight:500;margin:22px 0 4px}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:4px 12px 8px 0;cursor:pointer;user-select:none}
.toggle input{width:16px;height:16px;cursor:pointer}
.seg{display:inline-flex;border:.5px solid var(--border);border-radius:8px;overflow:hidden;margin:4px 0 8px}
.seg button{border:0;background:transparent;color:var(--muted);font-size:13px;padding:5px 12px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--sel);color:var(--ink)}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin:6px 0;font-size:11px;color:var(--muted)}
.legend .code{color:var(--ink);font-family:var(--mono)}
.panel{position:relative;width:100%;height:200px}
.empty{color:var(--faint);font-size:14px;padding:40px 0}
.bandwrap{margin-top:6px}
select.diveSel{font-size:13px;padding:5px 8px;border:.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);font-family:inherit;margin:4px 0 8px}
.note{font-size:12px;color:var(--faint);margin-top:20px;border-top:.5px solid var(--border);padding-top:10px}
.btnish{font-size:13px;padding:7px 14px;border-radius:8px;border:.5px solid var(--border);background:var(--sel);color:var(--ink);cursor:pointer;font-family:inherit;margin:6px 0 16px;display:inline-block}
.btnish:hover{filter:brightness(0.97)}
dialog{border:none;border-radius:12px;padding:18px;max-width:640px;width:92vw;box-shadow:0 10px 40px rgba(0,0,0,.3);background:var(--card);color:var(--ink)}
dialog::backdrop{background:rgba(0,0,0,.5)}
.row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
</style></head><body>
<div class="app">

  <main id="main"><div class="empty">Select a diver from the list.</div></main>
</div>

function seasonIndices(){

  if(finalsIdx.length>=2) return [finalsIdx[finalsIdx.length-2], finalsIdx[finalsIdx.length-1]];

function posChart(el,pos,d){
  let data,ytitle,yopts,meta=pos;
  if(posmode=="pct"){
    data=pos.map(p=>p.better);
    ytitle="field standing (higher = better placed)";
    yopts={min:0,max:100};
  }else if(posmode=="pos"){
    data=pos.map(p=>p.rank!=null?p.rank:null);
    ytitle="finishing position (1st at top)";
    const maxN=Math.max(...pos.filter(p=>p.n).map(p=>p.n),1);
    yopts={min:1,max:maxN,reverse:true,ticks:{stepSize:1,precision:0}};
  }else{
    // "actual score": sum this diver's DD-points across all their dives at each meet.
    const scores=DATA.meetorder.map((m,i)=>{
      let total=null;
      for(const M in d.dives){ for(const c in d.dives[M]){
        const e=d.dives[M][c][i];
        if(e && !e.isTraining){ total=(total||0)+e.pts; }
      }}
      return total;
    });
    data=scores;
    meta=pos.map((p,i)=>Object.assign({},p,{score:scores[i]}));
    ytitle="total competition score";
    yopts={}; // let Chart.js auto-scale; totals vary too much across brackets for a fixed range

          const lines=[];
          if(m.score!=null) lines.push("score: "+m.score.toFixed(2));
          if(m.better!=null) lines.push("placed "+m.rank+" of "+m.n,"top "+(100-m.better)+"%");

function diveCodeOf(entry){ return (entry.dive.split(" - ")[0]||entry.dive).trim(); }
function parseUKDate(s){ const p=(s||"").split("/"); if(p.length<3) return null; const d=+p[0],m=+p[1],y=+p[2]; if(!d||!m||!y) return null; return new Date(y,m-1,d); }

function diveChart(el,codes,dives,name){
  const showTraining = includeTraining && mode=="raw";
  const meetSlots = DATA.meetorder.map((m,idx)=>({type:"meet",idx,date:new Date(MEET_DATES[m]||0),label:[DATA.short[m]||m,m]}));
  let trainSlots=[]; let trainByCodeDate={};
  if(showTraining){
    const entries=(TRAINING[(name||"").toLowerCase()]||[]).filter(e=>codes.includes(diveCodeOf(e)));
    const seen=new Map();
    for(const e of entries){
      const code=diveCodeOf(e);
      trainByCodeDate[code]=trainByCodeDate[code]||{};
      trainByCodeDate[code][e.date]=e;
      if(!seen.has(e.date)) seen.set(e.date, parseUKDate(e.date)||new Date(0));
    }
    trainSlots=[...seen.entries()].map(([dstr,dt])=>({type:"training",dateStr:dstr,date:dt,label:[dstr,"training"]}));
  }
  const allSlots=meetSlots.concat(trainSlots).sort((a,b)=>a.date-b.date);
  const labels=allSlots.map(s=>s.label);
  const isTrainSlot=allSlots.map(s=>s.type=="training");

  const ds=codes.map((c,i)=>{
    const series=dives[c];
    const data=[], meta=[];
    for(const slot of allSlots){
      if(slot.type=="meet"){
        const e=series[slot.idx];
        data.push(e?(mode=="corr"?e.corr:e.raw):null);
        meta.push(e||null);
      } else {
        const e=(trainByCodeDate[c]||{})[slot.dateStr];
        if(e){ const raw=parseFloat(e.rating); const tripled=isNaN(raw)?null:raw*3;
          data.push(tripled); meta.push({isTraining:true,rawRating:e.rating,tripled,notes:e.notes,date:slot.dateStr});
        } else { data.push(null); meta.push(null); }
      }
    }
    return {label:c,data,meta,
      borderColor:cove[i%5],backgroundColor:cove[i%5],borderWidth:2,borderDash:dash[i%5],tension:.25,
      pointRadius:isTrainSlot.map(t=>t?5:3),
      pointStyle:isTrainSlot.map(t=>t?"rectRot":"circle"),

      pointBorderWidth:isTrainSlot.map(t=>t?2.5:1.5),spanGaps:true};});

  const yt=mode=="corr"?"vs field average":"raw 3-judge total"+(showTraining?" (training \u00d73)":"");

  const chart=new Chart(el,{type:"line",data:{labels,datasets:ds},

        tooltip:{callbacks:{title:i=>{const d=i[0];const l=Array.isArray(d.label)?d.label.join(" "):d.label;return d.dataset.label+" · "+l;},
          label:it=>{const e=it.dataset.meta[it.dataIndex];if(!e)return"";
            if(e.isTraining){return ["training session","score: "+e.rawRating+"/10","\u2248"+e.tripled.toFixed(1)+" (\u00d73, rough comp.-scale estimate)"].concat(e.notes?["notes: "+e.notes]:[]);}
            const s=e.corr>=0?"+":"";
            return ["judges: "+e.j.join(" / "),"raw total: "+e.raw.toFixed(1),"DD "+e.dd.toFixed(1)+" \u2192 "+e.pts.toFixed(2)+" pts","vs avg: "+s+e.corr.toFixed(2)];}}}},
      scales:{y:{min:ymin,max:ymax,title:{display:true,text:yt,color:col("--faint"),font:{size:10}},ticks:{color:col("--faint"),font:{size:10}},
        grid:{color:c=>(mode=="corr"&&c.tick.value===0)?col("--zero"):col("--grid"),lineWidth:c=>(mode=="corr"&&c.tick.value===0)?1.5:1}},

function computeStrengths(d, includedIdx, useRaw){
  const summary=[];
  for(const M of Object.keys(d.dives)){
    for(const c of Object.keys(d.dives[M])){
      const series=d.dives[M][c];
      const vals=[];
      includedIdx.forEach(i=>{const e=series[i]; if(e) vals.push(useRaw?e.raw:e.corr);});
      if(vals.length) summary.push({code:c,M,mean:vals.reduce((a,b)=>a+b,0)/vals.length,n:vals.length});
    }
  }
  summary.sort((a,b)=>b.mean-a.mean);
  return summary;
}

  el.parentElement.style.height=h+"px";
  strengthsChartInstance=new Chart(el,{type:"bar",data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:4,barThickness:18}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{title:i=>summary[i[0].dataIndex].code,
          label:it=>{const s=summary[it.dataIndex];return [(useRaw?"avg raw total: ":"avg vs field: ")+(!useRaw&&s.mean>=0?"+":"")+s.mean.toFixed(2),"across "+s.n+" selected meet"+(s.n>1?"s":""),Mlab[s.M]];}}}},
      scales:{x:{title:{display:true,text:useRaw?"avg raw 3-judge total (selected meets)":"avg vs field average (selected meets)",color:col("--faint"),font:{size:10}},ticks:{color:col("--faint"),font:{size:10}},grid:{color:c=>(!useRaw&&c.tick.value===0)?col("--zero"):col("--grid"),lineWidth:c=>(!useRaw&&c.tick.value===0)?1.5:1}},
        y:{ticks:{color:col("--ink"),font:{size:11,family:"ui-monospace,Menlo,monospace"}},grid:{display:false}}}}});
}


function bandChart(el,name,M,code){
  const d=DATA.divers[name];
  const series=d.dives[M][code];
  const bands=[],pts=[],labels=[];
  DATA.meetorder.forEach((m,i)=>{
    const e=series[i];
    if(!e){bands.push(null);pts.push(null);return;}
    const key=m+"|"+e.ev+"|"+code;
    const fs=DATA.fieldstats[key];
    bands.push(fs?[fs.q1,fs.q3]:null);
    pts.push(e.raw);
  });
  bandChartInstance=new Chart(el,{type:"bar",data:{labels:xlabels(),
    datasets:[
      {type:"bar",label:"field IQR",data:bands,backgroundColor:"rgba(42,120,214,0.18)",borderColor:"rgba(42,120,214,0.35)",borderWidth:1,borderRadius:3,barThickness:34,order:2},
      {type:"line",label:name,data:pts,borderColor:"#eb6834",backgroundColor:"#eb6834",borderWidth:0,pointRadius:6,pointHoverRadius:8,pointStyle:"circle",showLine:false,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          title:i=>{const l=i[0].label;return Array.isArray(l)?l.join(" "):l;},
          label:it=>{
            const idx=it.dataIndex; const e=series[idx];
            if(it.datasetIndex===0){const b=bands[idx];if(!b)return"no field data";const key=DATA.meetorder[idx]+"|"+(e?e.ev:"")+"|"+code;const fs=DATA.fieldstats[key];return ["field: min "+fs.min.toFixed(1)+" · q1 "+fs.q1.toFixed(1)+" · median "+fs.med.toFixed(1)+" · q3 "+fs.q3.toFixed(1)+" · max "+fs.max.toFixed(1),"n = "+fs.n+" divers on this dive"];}
            if(!e)return ""; return [name+": "+e.raw.toFixed(1),"judges: "+e.j.join(" / "),"DD "+e.dd.toFixed(1)+" → "+e.pts.toFixed(2)+" pts"];
          }}}},
      scales:{y:{title:{display:true,text:"raw 3-judge total",color:col("--faint"),font:{size:10}},ticks:{color:col("--faint"),font:{size:10}},grid:{color:col("--grid")}},
        x:{ticks:{color:col("--faint"),font:{size:10}},grid:{display:false},stacked:false}}}});
}

// ===== Training log (optional Google Sheet integration) =====
// Uses Google's gviz/tq endpoint via a <script> tag (JSONP-style), which is exempt
// from CORS entirely — unlike fetch()ing the "Publish to web > CSV" link, which
// commonly fails with a CORS error regardless of hosting.
// To enable: paste your Sheet's ID (from its normal edit URL) and the tab's gid below.
// Leave TRAINING_SHEET_ID empty to disable the feature entirely.
const TRAINING_SHEET_ID = "129H-dzA6Sv6BOLMV78KEnR-gcPpOO_kfml6s3N7ai08";
const FORM_BASE = "https://docs.google.com/forms/d/e/1FAIpQLSeQsQTMZov2ikSauzJQoFxvubrHAiVL0CfPC1yYVQ9x9EKo9g/viewform";
const FORM_DIVER_ENTRY_ID = "entry.1023654138";
const TRAINING_SHEET_GID = "1955423402";

let TRAINING={}; // diverName(lowercased) -> [{date,dive,rating,notes}]
let trainingLoaded=false;
let currentDiverName=null;

function loadTrainingLog(){
  if(!TRAINING_SHEET_ID) return;
  const old=document.getElementById("trainingLogScript");
  if(old) old.remove();
  const src="https://docs.google.com/spreadsheets/d/"+TRAINING_SHEET_ID+"/gviz/tq?gid="+TRAINING_SHEET_GID+"&tqx=responseHandler:trainingLogCallback";
  const script=document.createElement("script");
  script.id="trainingLogScript";
  script.src=src;
  script.onerror=()=>console.warn("training log: script failed to load — check TRAINING_SHEET_ID/GID are correct and the sheet is shared as \"Anyone with the link can view\"");
  document.head.appendChild(script);
}

function refreshTrainingLog(){
  TRAINING={};
  trainingLoaded=false;
  const oldBanner=document.getElementById("trainingMismatchBanner");
  if(oldBanner) oldBanner.remove();
  loadTrainingLog();
}

window.trainingLogCallback=function(resp){
  try{
    const table=resp.table;
    if(!table || !table.cols || !table.rows) return;
    const header=table.cols.map(c=>(c.label||"").trim().toLowerCase());
    const iDiver=header.indexOf("diver"), iDate=header.indexOf("date"),
          iDive=header.indexOf("dive"), iRating=["rating (1-10)","rating","score"].map(h=>header.indexOf(h)).find(i=>i>=0)??-1,
          iNotes=header.indexOf("notes");
    const cellText=c=>{ if(!c) return ""; return (c.f!=null?c.f:c.v)??""; };
    const knownNames=new Set(Object.keys(DATA.divers).map(n=>n.toLowerCase()));
    const unmatched=new Set();
    for(const row of table.rows){
      const cells=row.c||[];
      const diverRaw=String(cellText(cells[iDiver])).trim();
      if(!diverRaw) continue;
      const key=diverRaw.toLowerCase();
      if(!knownNames.has(key)) unmatched.add(diverRaw);
      if(!TRAINING[key]) TRAINING[key]=[];
      TRAINING[key].push({
        date:String(cellText(cells[iDate])),
        dive:String(cellText(cells[iDive])).trim(),
        rating:String(cellText(cells[iRating])),
        notes:String(cellText(cells[iNotes]))
      });
    }
    for(const k in TRAINING) TRAINING[k].sort((a,b)=>a.date<b.date?1:-1);
    trainingLoaded=true;
    if(unmatched.size){
      const banner=document.createElement("div");
      banner.id="trainingMismatchBanner";
      banner.style.cssText="background:#fdf0e6;border:1px solid #e0a45c;color:#8a5a1e;font-size:12px;padding:8px 12px;margin:0 0 12px;border-radius:8px";
      banner.textContent="Training log: "+unmatched.size+" name(s) in the sheet don't match any diver on record — check spelling: "+[...unmatched].join(", ");
      document.body.insertBefore(banner,document.body.firstChild);
    }
    if(currentDiverName) render(currentDiverName);
  }catch(e){ console.warn("training log: failed to process response",e); }
};

function trainingFormHTML(name){
  if(!TRAINING_SHEET_ID || !FORM_BASE) return "";
  const q="?"+FORM_DIVER_ENTRY_ID+"="+encodeURIComponent(name);
  const embedUrl=FORM_BASE+q+"&embedded=true";
  const openUrl=FORM_BASE+q+"&usp=pp_url";
  let h="<button id='logSessionBtn' class='btnish' type='button'>+ Log a training session</button>";
  h+="<dialog id='logSessionDialog'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>";
  h+="<strong style='font-size:14px'>Log a training session — "+name+"</strong>";
  h+="<button id='closeLogDialog' type='button' aria-label='Close' style='background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px'>&times;</button>";
  h+="</div>";
  h+="<iframe id='logSessionIframe' src='"+embedUrl+"' width='100%' height='700' style='border:none;border-radius:8px' loading='lazy'>Loading…</iframe>";
  h+="<p style='margin:6px 0 0'><a href='"+openUrl+"' target='_blank' rel='noopener' style='font-size:12px;color:var(--accent)'>Form not loading? Open it in a new tab \u2197</a></p>";
  h+="</dialog>";
  return h;
}

function trainingLogHTML(name){
  if(!TRAINING_SHEET_ID || !trainingLoaded) return "";
  const entries=TRAINING[name.toLowerCase()];
  if(!entries || !entries.length) return "";
  const ratings=entries.map(e=>parseFloat(e.rating)).filter(n=>!isNaN(n));
  const avg=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):null;
  let h="<h3>Training log</h3>";
  h+="<p class=sub style='margin:-2px 0 6px'>"+entries.length+" session"+(entries.length>1?"s":"")+(avg?" · avg score "+avg+"/10":"")+" · self-reported, not judged — not comparable to competition scores</p>";
  h+="<table style='width:100%;border-collapse:collapse;font-size:13px'>";
  h+="<tr style='text-align:left;color:var(--faint);font-size:11px'><th style='padding:4px 8px 4px 0'>date</th><th style='padding:4px 8px'>dive</th><th style='padding:4px 8px'>score</th><th style='padding:4px 0'>notes</th></tr>";
  for(const e of entries.slice(0,20)){
    const diveParts=e.dive.split(" - ");
    const diveCode=diveParts[0]||e.dive;
    const diveRest=diveParts.slice(1).join(" · ");
    const diveCell="<span style='font-family:var(--mono)'>"+diveCode+"</span>"+(diveRest?"<br><span style='font-size:10px;color:var(--faint)'>"+diveRest+"</span>":"");
    h+="<tr style='border-top:.5px solid var(--border)'><td style='padding:4px 8px 4px 0;white-space:nowrap;vertical-align:top'>"+e.date+"</td><td style='padding:4px 8px;vertical-align:top'>"+diveCell+"</td><td style='padding:4px 8px;vertical-align:top'>"+(e.rating||"—")+"</td><td style='padding:4px 0;color:var(--muted);vertical-align:top'>"+e.notes+"</td></tr>";
  }
  h+="</table>";
  return h;
}

function render(name){
  destroyCharts();
  const d=DATA.divers[name];
  const nMeets=d.pos.filter(p=>p.better!=null).length;
  let h="<h2>"+name+"</h2><p class=sub>"+d.club+" · "+nMeets+" meet"+(nMeets>1?"s":"")+" with full field data</p>";
  if(nMeets<2){h+="<div class=empty>Only one meet on record — no progression to show. Per-dive detail below.</div>";}
  h+="<h3>Strengths &amp; weaknesses (all dives, ranked)</h3><p class=sub style='margin:-2px 0 6px'>Untick meets to see how the ranking shifts over a different window.</p>";
  h+="<div class=seg id=presetSeg><button data-p=all>All time</button><button data-p=last3>Last 3</button><button data-p=season>This season</button><button data-p=custom>Customise</button></div>";
  h+="<div id=timelineWrap style='display:none;padding:16px 12px 10px;border:.5px solid var(--border);border-radius:8px;background:var(--sel);margin-bottom:8px'><div id=meetTimeline></div></div>";
  h+="<div class=seg><button id=sm-diff data-m=corr class=\""+(strengthMode=="corr"?"on":"")+"\">difference from average</button><button id=sm-raw data-m=raw class=\""+(strengthMode=="raw"?"on":"")+"\">raw scores</button></div>";
  h+="<div class=legend><span style='display:flex;align-items:center;gap:5px'><span style='width:10px;height:10px;border-radius:2px;background:#2a78d6'></span>poolside</span><span style='display:flex;align-items:center;gap:5px'><span style='width:10px;height:10px;border-radius:2px;background:#eb6834'></span>1m</span><span style='display:flex;align-items:center;gap:5px'><span style='width:10px;height:10px;border-radius:2px;background:#1baf7a'></span>3m</span></div>";
  h+="<div class=panel style='height:auto'><canvas id=strc></canvas></div>";
  h+="<h3>Score vs field spread</h3><p class=sub style='margin:-2px 0 6px'>Pick a dive to see the diver's score against the field's middle 50% (shaded) for that dive, at each meet.</p>";
  h+="<select class=diveSel id=bandSel></select>";
  h+="<div class=panel bandwrap><canvas id=bandc></canvas></div>";
  h+="<h3>Field standing over time</h3>";
  h+="<div class=seg><button id=pp data-m=pct class=\""+(posmode=="pct"?"on":"")+"\">percentage</button><button id=pr data-m=pos class=\""+(posmode=="pos"?"on":"")+"\">actual position</button><button id=ps data-m=score class=\""+(posmode=="score"?"on":"")+"\">actual score</button></div>";
  h+="<div class=panel><canvas id=posc></canvas></div>";
  h+="<label class=toggle><input type=checkbox id=modebox "+(mode=="raw"?"checked":"")+"> show raw judge totals instead of severity-corrected</label>";
  if(mode=="raw" && TRAINING_SHEET_ID){
    h+="<label class=toggle><input type=checkbox id=trainToggle "+(includeTraining?"checked":"")+"> include training log entries (score ×3, shown after competitions)</label>";
  }
  const stationKeys=Object.keys(d.dives).sort();
  for(const M of stationKeys){h+="<h3>"+Mlab[M]+"</h3><div class=legend id=lg"+M+"></div><div class=panel><canvas id=dc"+M+"></canvas></div>";}
  h+=trainingFormHTML(name);
  h+=trainingLogHTML(name);
  h+='<p class=note>Field standing reconstructed from summed DD-points, with guest divers excluded from rank, field size, and field-average calculations throughout (matches official placings). Percentage view normalises for field size (good across meets) but flatters tiny fields — e.g. 1st of 2 shows as top 50%. Actual-position view shows the real placing (1st at top) but does not account for how many competed. Per-dive severity-corrected = points above/below that meet\'s field average for that dive. Ten meets, May 2024 – Jul 2026.</p>';
  document.getElementById("main").innerHTML=h;
  posChart(document.getElementById("posc"),d.pos,d);
  const logBtn=document.getElementById("logSessionBtn"), logDialog=document.getElementById("logSessionDialog");
  if(logBtn && logDialog){
    logBtn.onclick=()=>logDialog.showModal();
    const closeBtn=document.getElementById("closeLogDialog");
    if(closeBtn) closeBtn.onclick=()=>logDialog.close();
    logDialog.addEventListener("click",e=>{ if(e.target===logDialog) logDialog.close(); });
    const logIframe=document.getElementById("logSessionIframe");
    if(logIframe){
      let loadCount=0;
      logIframe.addEventListener("load",()=>{
        loadCount++;
        if(loadCount>1) setTimeout(refreshTrainingLog,1200); // 2nd+ load = form was submitted (moved to confirmation screen)
      });
    }
  }
  const allIdx=d.meets.map(m=>DATA.meetorder.indexOf(m)).sort((a,b)=>a-b);
  let selectedIdx=new Set(allIdx);

  function presetIndices(p){
    if(p=="last3") return allIdx.slice(-3);
    if(p=="season"){ const [s,e]=seasonIndices(); return allIdx.filter(i=>i>s&&i<=e); }
    return allIdx.slice();
  }
  function setActiveButton(p){ document.querySelectorAll("#presetSeg button").forEach(b=>b.className=(b.dataset.p==p?"on":"")); }
  function applyPreset(p){
    const w=document.getElementById("timelineWrap");
    if(p=="custom"){
      setActiveButton("custom");
      w.style.display="block";
      renderTimeline();
      return;
    }
    selectedIdx=new Set(presetIndices(p));
    setActiveButton(p);
    w.style.display="none";
    renderTimeline(); drawStrengths();
  }
  function renderTimeline(){
    const tl=document.getElementById("meetTimeline");
    tl.innerHTML="<div id=tlDetail style='font-size:11px;color:var(--muted);min-height:14px;margin-bottom:8px'>&nbsp;</div><div style='position:relative'><div style='position:absolute;top:5px;left:4px;right:4px;height:1px;background:var(--grid)'></div><div style='display:flex;justify-content:space-between;position:relative'>"+
      DATA.meetorder.map((m,i)=>{
        const attended=allIdx.includes(i), on=selectedIdx.has(i);
        const dot=attended?(on?"background:var(--accent)":"background:var(--bg);border:1.5px solid var(--grid)"):"background:var(--bg);border:1px solid var(--grid);opacity:.35";
        const nm=m.replace(/"/g,"&quot;");
        return "<div class=tlDot data-idx='"+i+"' data-name=\""+nm+"\" title=\""+nm+"\" style='display:flex;flex-direction:column;align-items:center;gap:6px;"+(attended?"cursor:pointer":"cursor:default")+"'>"+
          "<div style='width:10px;height:10px;border-radius:50%;"+dot+"'></div>"+
          "<span style='font-size:11px;color:var(--muted);white-space:nowrap'>"+(DATA.short[m]||m)+"</span></div>";
      }).join("")+"</div></div>";
    const detail=document.getElementById("tlDetail");
    tl.querySelectorAll(".tlDot").forEach(el=>{
      const i=parseInt(el.dataset.idx);
      el.addEventListener("mouseenter",()=>{detail.textContent=el.dataset.name;});
      el.addEventListener("mouseleave",()=>{detail.innerHTML="&nbsp;";});
      el.addEventListener("touchstart",()=>{detail.textContent=el.dataset.name;},{passive:true});
      if(!allIdx.includes(i)) return;
      el.onclick=()=>{ if(selectedIdx.has(i)) selectedIdx.delete(i); else selectedIdx.add(i); setActiveButton("custom"); renderTimeline(); drawStrengths(); };
    });
  }
  document.querySelectorAll("#presetSeg button").forEach(b=>b.onclick=()=>applyPreset(b.dataset.p));
  function drawStrengths(){
    if(strengthsChartInstance){strengthsChartInstance.destroy();strengthsChartInstance=null;}
    const summary=computeStrengths(d,[...selectedIdx],strengthMode==="raw");
    strengthsChart(document.getElementById("strc"),summary,strengthMode==="raw");
  }
  applyPreset("all");
  document.getElementById("sm-diff").onclick=()=>{strengthMode="corr";drawStrengths();document.getElementById("sm-diff").className="on";document.getElementById("sm-raw").className="";};
  document.getElementById("sm-raw").onclick=()=>{strengthMode="raw";drawStrengths();document.getElementById("sm-raw").className="on";document.getElementById("sm-diff").className="";};
  drawStrengths();
  const bandOpts=[];
  for(const M of Object.keys(d.dives).sort()){for(const c of Object.keys(d.dives[M])){bandOpts.push({M,c});}}
  const bandSel=document.getElementById("bandSel");
  bandSel.innerHTML=bandOpts.map(o=>"<option value='"+o.M+"|"+o.c+"'>"+Mlab[o.M]+" · "+o.c+"</option>").join("");
  function drawBand(){
    if(bandChartInstance){bandChartInstance.destroy();bandChartInstance=null;}
    const [M,c]=bandSel.value.split("|");
    bandChart(document.getElementById("bandc"),name,M,c);
  }
  bandSel.onchange=drawBand;
  drawBand();

  for(const M of stationKeys){
    const codes=Object.keys(d.dives[M]);
    const chart=diveChart(document.getElementById("dc"+M),codes,d.dives[M],name);
    const lg=document.getElementById("lg"+M);
    lg.innerHTML=codes.map((c,i)=>"<span class=legendItem data-idx='"+i+"' style='display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none'><span style='width:22px;height:0;border-top:2.5px "+dstyle[i%5]+" "+cove[i%5]+"'></span><span class=code>"+c+"</span></span>").join("");
    lg.querySelectorAll(".legendItem").forEach(el=>{
      const idx=parseInt(el.dataset.idx);
      el.onclick=()=>{
        const visible=chart.isDatasetVisible(idx);
        chart.setDatasetVisibility(idx, !visible);
        chart.update();
        el.style.opacity = visible ? 0.35 : 1;
      };
    });
  }
  document.getElementById("modebox").onchange=e=>{mode=e.target.checked?"raw":"corr";render(name);};
  const tt=document.getElementById("trainToggle");
  if(tt) tt.onchange=e=>{includeTraining=e.target.checked;render(name);};
  document.getElementById("pp").onclick=()=>{posmode="pct";render(name);};
  document.getElementById("pr").onclick=()=>{posmode="pos";render(name);};
  document.getElementById("ps").onclick=()=>{posmode="score";render(name);};
}

const names=Object.keys(DATA.divers).sort();
document.getElementById("list").innerHTML=names.map(n=>{
  const nm=DATA.divers[n].pos.filter(p=>p.better!=null).length;
  return "<div class=diver data-n='"+n.replace(/'/g,"&#39;")+"'><span>"+n+"</span><span class=n>"+nm+"</span></div>";
}).join("");
document.querySelectorAll(".diver").forEach(el=>el.onclick=()=>{
  document.querySelectorAll(".diver").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel"); currentDiverName=el.dataset.n; render(el.dataset.n);
  const url=new URL(location.href);
  url.searchParams.set("diver",el.dataset.n);
  history.pushState({diver:el.dataset.n},"",url);
});

// Back/forward browser navigation should also switch diver.
window.addEventListener("popstate",()=>{
  const params=new URLSearchParams(location.search);
  const wanted=params.get("diver");
  if(!wanted) return;
  const match=names.find(n=>n.toLowerCase()===wanted.toLowerCase());
  if(match){
    const el=document.querySelector(".diver[data-n='"+match.replace(/'/g,"&#39;")+"']");
    if(el){ document.querySelectorAll(".diver").forEach(x=>x.classList.remove("sel")); el.classList.add("sel"); currentDiverName=match; render(match); }
  }
});

// Shareable direct link: ?diver=Full%20Name auto-opens that diver's page.
(function(){
  const params=new URLSearchParams(location.search);
  const wanted=params.get("diver");
  if(wanted){
    const match=names.find(n=>n.toLowerCase()===wanted.toLowerCase());
    if(match){
      const el=document.querySelector(".diver[data-n='"+match.replace(/'/g,"&#39;")+"']");
      if(el) el.click();
    }
  }
})();

loadTrainingLog();
